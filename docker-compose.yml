services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tars
      POSTGRES_USER: tars
      POSTGRES_PASSWORD: tars_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://tars:tars_dev@db:5432/tars?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production
      PORT: "8080"
    depends_on:
      - db

volumes:
  pgdata:

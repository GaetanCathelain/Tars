services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tars
      POSTGRES_PASSWORD: tars
      POSTGRES_DB: tars
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tars"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

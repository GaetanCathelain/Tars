services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tars
      POSTGRES_USER: tars
      POSTGRES_PASSWORD: tars_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tars"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: postgres://tars:tars_dev@postgres:5432/tars?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production
      PORT: "3333"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:

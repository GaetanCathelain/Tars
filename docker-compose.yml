name: tars

services:
  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tars}
      POSTGRES_USER: ${POSTGRES_USER:-tars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tars}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tars} -d ${POSTGRES_DB:-tars}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tars}:${POSTGRES_PASSWORD:-tars}@db:5432/${POSTGRES_DB:-tars}?sslmode=disable
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-http://localhost:8080/auth/github/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ENV: ${ENV:-development}
      # Migrations are embedded in the image at /app/migrations
      MIGRATIONS_DIR: /app/migrations
      # Agent workspace root — repos are cloned here, worktrees live inside them
      WORKSPACES_DIR: /app/workspaces
      # Claude Code CLI credentials and config
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CONFIG_DIR: /app/claude-config
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - workspaces:/app/workspaces
      - claude_config:/app/claude-config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
      ORIGIN: ${ORIGIN:-http://localhost:3000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  db_data:
  workspaces:
  claude_config:
